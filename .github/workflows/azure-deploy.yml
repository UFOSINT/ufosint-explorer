name: Build and deploy Python app to Azure Web App

# Triggers on push to main + manual dispatch. Tag pushes (v*) also
# trigger a deploy so cutting a release tag ships the tagged commit.
#
# Pipeline stages:
#   1. test   — lint + pytest + node -c static/app.js
#   2. build  — zip the deployment artifact
#   3. deploy — azure/webapps-deploy@v3 uploads to App Service
#   4. smoke  — curl /health and verify versioned asset URLs in /
#
# The test job runs first and blocks build/deploy. The smoke job runs
# after deploy and fails the workflow if the live site regresses.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ufosint-explorer
  PYTHON_VERSION: '3.12'
  LIVE_URL: https://ufosint-explorer.azurewebsites.net

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------
  # 1. TEST — must pass before build/deploy runs
  # -----------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js (for JS syntax check)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Check JS syntax
        run: node -c static/app.js

      - name: Run pytest
        run: pytest tests/ -v

  # -----------------------------------------------------------------
  # 2. BUILD — zip the deployment artifact
  # -----------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install production dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create deployment package
        run: |
          zip -r release.zip . \
            -x "*.git*" \
            -x "venv/*" \
            -x ".venv/*" \
            -x "__pycache__/*" \
            -x "**/__pycache__/*" \
            -x "*.pyc" \
            -x "tests/*" \
            -x "requirements-dev.txt" \
            -x "pyproject.toml" \
            -x "*.db" \
            -x "*.db-*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip
          retention-days: 3

  # -----------------------------------------------------------------
  # 3. DEPLOY — upload to Azure App Service
  # -----------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}

  # -----------------------------------------------------------------
  # 4. SMOKE — verify the live deploy is actually healthy
  # -----------------------------------------------------------------
  smoke:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for container restart
        run: sleep 45

      - name: Probe /health
        run: |
          set -euo pipefail
          echo "Fetching $LIVE_URL/health"
          body=$(curl -sS --fail --max-time 30 "$LIVE_URL/health")
          echo "Got: $body"
          echo "$body" | grep -q '"status":"ok"' || {
            echo "::error::/health did not return status=ok"
            exit 1
          }
          echo "$body" | grep -q '"sightings":[0-9]' || {
            echo "::error::/health missing sightings count"
            exit 1
          }

      - name: Probe / for versioned asset URLs
        run: |
          set -euo pipefail
          echo "Fetching $LIVE_URL/"
          html=$(curl -sS --fail --max-time 30 "$LIVE_URL/?smoke=$(date +%s)")
          echo "$html" | grep -q 'style.css?v=' || {
            echo "::error::rendered HTML missing versioned style.css URL (cache-bust broken)"
            echo "--- first 40 lines of response ---"
            echo "$html" | head -40
            exit 1
          }
          echo "$html" | grep -q 'app.js?v=' || {
            echo "::error::rendered HTML missing versioned app.js URL"
            exit 1
          }
          if echo "$html" | grep -q '{{ASSET_VERSION}}'; then
            echo "::error::ASSET_VERSION placeholder leaked into rendered HTML"
            exit 1
          fi
          echo "OK: HTML contains versioned asset URLs"

      - name: Probe /api/filters and /api/stats
        run: |
          set -euo pipefail
          curl -sS --fail --max-time 30 "$LIVE_URL/api/filters" > /dev/null
          curl -sS --fail --max-time 30 "$LIVE_URL/api/stats"   > /dev/null
          echo "OK: core API endpoints respond 200"
